apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: luftschmaus-staging
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/overlays/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: luftschmaus-webapp-main
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: frontend
      namespace: luftschmaus-staging
    - apiVersion: apps/v1
      kind: Deployment
      name: backend
      namespace: luftschmaus-staging
